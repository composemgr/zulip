# nginx proxy address - http://172.17.0.1:8093

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  zulip:
    image: zulip/docker-zulip:latest
    container_name: zulip-app
    restart: unless-stopped
    logging: *default-logging
    networks:
      - zulip
    ports:
      - "8093:80"
    environment:
      TZ: ${TZ:-America/New_York}
      DATABASE_URL: postgres://${DB_USER_NAME:-zulip}:${DB_USER_PASS:-changeme_db_password}@zulip-db:5432/${DB_CREATE_DATABASE_NAME:-zulip}
    volumes:
      - ./volumes/data/zulip:/data
      - ./volumes/config/zulip:/config
    depends_on:
      - zulip-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  zulip-db:
    image: postgres:16-alpine
    container_name: zulip-db
    restart: unless-stopped
    logging: *default-logging
    networks:
      - zulip
    environment:
      TZ: ${TZ:-America/New_York}
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-zulip}
      POSTGRES_USER: ${DB_USER_NAME:-zulip}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
    volumes:
      - ./volumes/data/db/postgres/zulip:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  zulip:
    external: false
